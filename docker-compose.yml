services:
  mysql_db:
    image: mysql:8.0
    container_name: mysql_local
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: "W1>1srmrvj"
      MYSQL_DATABASE: "u719040383_erp_gaslp"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build: .
    container_name: express_api
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - mysql_db
    # Usamos sh -c para encadenar los comandos de Prisma y el inicio de la app
    command: sh -c "npx prisma generate && npx prisma db push && node app.js"
    environment:
      DATABASE_URL: "mysql://root:W1>1srmrvj@mysql_db:3306/u719040383_erp_gaslp"
      NODE_ENV: "production"
      PORT: 3001
      DB_HOST: mysql_db
      DB_USER: root
      DB_PASSWORD: "W1>1srmrvj"
      DB_NAME: "u719040383_erp_gaslp"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_local
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql_db
      PMA_USER: root
      PMA_PASSWORD: "W1>1srmrvj"
    depends_on:
      - mysql_db

volumes:
  mysql_data:
